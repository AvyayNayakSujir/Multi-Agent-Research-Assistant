name: Build and Push Docker Image

# 1. Trigger the workflow whenever code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository code into the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub using the secrets you saved earlier
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx (required for advanced caching features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build your Dockerfile and push it to Docker Hub
      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            avimon385/research-assistant-service:latest
            avimon385/research-assistant-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max